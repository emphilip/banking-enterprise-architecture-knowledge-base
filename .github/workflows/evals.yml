name: knowledge-base-evals

# Runs the deterministic eval harness on every push and pull request.
# Deterministic checks only (no LLM-judge) so CI is fast and needs no secrets.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  deterministic-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run eval harness (all phases + regression)
        run: python evals/checks.py --phase all
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            evals/REPORT.md
            evals/report.json
